name: Build DMG

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Create Package.swift
      run: |
        cat > Package.swift << 'EOF'
        // swift-tools-version: 5.9
        import PackageDescription
        
        let package = Package(
            name: "ILoveSkibidiV2",
            platforms: [.macOS(.v13)],
            products: [
                .executable(name: "ILoveSkibidiV2", targets: ["ILoveSkibidiV2"])
            ],
            targets: [
                .executableTarget(
                    name: "ILoveSkibidiV2",
                    sources: [
                        "ILoveSkibidiV2App.swift",
                        "Views/LoadingScreenView.swift",
                        "Views/MainView.swift",
                        "Views/TextCorrectionView.swift",
                        "Views/NotabilityImportView.swift",
                        "Views/ScannerView.swift",
                        "Views/SettingsView.swift",
                        "Services/TextCorrectionService.swift",
                        "Services/NotabilityImportService.swift",
                        "Services/ScannerService.swift",
                        "Components/PremiumComponents.swift",
                        "Extensions/Color+Theme.swift"
                    ],
                    resources: [
                        .copy("Info.plist")
                    ]
                )
            ]
        )
        EOF
        
    - name: Build with Swift
      run: |
        swift build -c release
        
    - name: Create macOS App Bundle
      run: |
        # Créer la structure de l'app
        APP_NAME="ILoveSkibidi V2"
        APP_PATH="build/release/${APP_NAME}.app"
        CONTENTS_PATH="${APP_PATH}/Contents"
        MACOS_PATH="${CONTENTS_PATH}/MacOS"
        RESOURCES_PATH="${CONTENTS_PATH}/Resources"
        
        mkdir -p "${MACOS_PATH}"
        mkdir -p "${RESOURCES_PATH}"
        
        # Copier l'exécutable
        cp build/release/ILoveSkibidiV2 "${MACOS_PATH}/${APP_NAME}"
        
        # Créer Info.plist
        cat > "${CONTENTS_PATH}/Info.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>ILoveSkibidi V2</string>
            <key>CFBundleIdentifier</key>
            <string>com.iloveskibidi.v2</string>
            <key>CFBundleName</key>
            <string>ILoveSkibidi V2</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>2.0.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
            <key>NSCameraUsageDescription</key>
            <string>ILoveSkibidi V2 nécessite l'accès à la caméra pour scanner des documents.</string>
            <key>NSAppleEventsUsageDescription</key>
            <string>ILoveSkibidi V2 nécessite l'accès pour envoyer des documents vers Notability.</string>
            <key>LSUIElement</key>
            <false/>
        </dict>
        </plist>
        EOF
        
        # Rendre l'exécutable exécutable
        chmod +x "${MACOS_PATH}/${APP_NAME}"
        
    - name: Create DMG
      run: |
        # Créer le DMG
        hdiutil create -volname "ILoveSkibidi V2" \
          -srcfolder "build/release/ILoveSkibidi V2.app" \
          -ov \
          -format UDZO \
          "ILoveSkibidiV2-$(date +%Y%m%d-%H%M%S).dmg"
          
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: ILoveSkibidiV2-DMG
        path: "*.dmg"
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: "*.dmg"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
